<a routerLink="/dashboard">Today's Article</a>

<h1>📚 Your Learning Archive</h1>

<div *ngIf="loading">
  Loading...
</div>

<div *ngIf="!loading">
  <div *ngFor="let article of articles">

    <a [routerLink]="['/archive', article.id]">
      <h3>{{ article.title }}</h3>
    </a>

    <p>{{ article.topic }}</p>

  </div>

  <p *ngIf="articles.length === 0">
    No articles yet
  </p>
</div>
