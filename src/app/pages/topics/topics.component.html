<h1>My Topics</h1>

<div *ngIf="loading">
  Loading...
</div>

<div *ngIf="!loading">

  <label for="newTopic">Enter a topic you'd like to learn about</label>
  <input
    [(ngModel)]="newTopic"
    placeholder="Enter a topic"
  />

  <button (click)="addTopic()">
    Add Topic
  </button>



  @if (topics.length != 0) {
  <hr />
  <h2>My Topics</h2>

  <div *ngFor="let topic of topics">
    • {{ topic }}
  </div>
  }


</div>
